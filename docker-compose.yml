services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Override the host/DB so the app reaches the mongo service on the compose network
      MONGODB_URI: mongodb://mongo:27017/crypton
      DATA_PATH: /data
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads:/data

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo-data:
  uploads:
